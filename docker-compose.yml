services:
  db:
    image: mysql:8.0
    container_name: radar-db
    environment:
      MYSQL_ROOT_PASSWORD: radar_test_2026
      MYSQL_DATABASE: kraak_radar
      MYSQL_USER: radar
      MYSQL_PASSWORD: radar_test_2026
    volumes:
      - radar_mysql:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "${RADAR_DB_PORT:-3308}:3306"
    restart: unless-stopped

  web:
    build: .
    container_name: radar-web
    ports:
      - "${RADAR_WEB_PORT:-8081}:80"
    volumes:
      - ./public:/var/www/html
      - ./config:/var/www/config
      - ./lib:/var/www/lib
      - ./cron:/var/www/cron
      - ./apache-config.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      DB_HOST: db
      DB_NAME: kraak_radar
      DB_USER: radar
      DB_PASS: radar_test_2026
      APP_URL: http://localhost:8081
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  radar_mysql:
